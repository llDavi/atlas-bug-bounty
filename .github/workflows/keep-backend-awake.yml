name: Keep backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        run: curl -sf --retry 3 --retry-delay 5 --max-time 90 https://atlas-backend-4fg2.onrender.com/health
